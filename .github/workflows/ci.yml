name: CI

on:
  push:
    branches: ["main"]
  pull_request:

env:
  MIX_ENV: test

jobs:
  test:
    name: mix test
    runs-on: ubuntu-22.04

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: agent_mmo
          POSTGRES_PASSWORD: tavernbench_dev
          POSTGRES_DB: agent_mmo_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.14.5"
          otp-version: "25.3"

      - name: Cache deps
        uses: actions/cache@v4
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Cache _build
        uses: actions/cache@v4
        with:
          path: _build
          key: ${{ runner.os }}-build-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-build-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile --warnings-as-errors

      - name: Create and migrate DB
        run: |
          mix ecto.create
          mix ecto.migrate
        env:
          PGHOST: localhost

      - name: Run tests (including WebSocket integration)
        run: mix test --trace
        env:
          PGHOST: localhost
